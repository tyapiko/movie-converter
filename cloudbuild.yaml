# Cloud Build 設定ファイル
steps:
  # Docker イメージをビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-f', 'Dockerfile.cloudrun',
      '-t', 'gcr.io/$PROJECT_ID/movie-converter:$BUILD_ID',
      '-t', 'gcr.io/$PROJECT_ID/movie-converter:latest',
      '.'
    ]
  
  # Container Registry にプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/movie-converter:$BUILD_ID']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/movie-converter:latest']

  # Cloud Run にデプロイ
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'movie-converter',
      '--image', 'gcr.io/$PROJECT_ID/movie-converter:$BUILD_ID',
      '--region', 'asia-northeast1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080',
      '--memory', '4Gi',
      '--cpu', '2',
      '--timeout', '3600',
      '--max-instances', '10',
      '--set-env-vars', 'GCP_PROJECT_ID=$PROJECT_ID,CLOUD_STORAGE_BUCKET=${_BUCKET_NAME}'
    ]

# 置換変数
substitutions:
  _BUCKET_NAME: 'movie-converter-files'

# イメージをContainer Registryに保存
images:
  - 'gcr.io/$PROJECT_ID/movie-converter:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/movie-converter:latest'

options:
  # ビルド時のマシンタイプを指定
  machineType: 'E2_HIGHCPU_8'
  
timeout: '1200s'